name: Build wheels

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.platform.name }} wheel
    runs-on: ${{ matrix.platform.runner }}

    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux x86_64
            artifact-name: linux-x86_64
            runner: ubuntu-latest
            build: cp312-manylinux_x86_64
          - name: macOS arm64
            artifact-name: macos-arm64
            runner: macos-14
            build: cp312-macosx_arm64
          - name: Windows x86_64
            artifact-name: windows-x86_64
            runner: windows-latest
            build: cp312-win_amd64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build wheel
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_BUILD: ${{ matrix.platform.build }}
          CIBW_TEST_COMMAND: python -m pytest {project}/tests
          CIBW_TEST_ENVIRONMENT: BILINEAR_BACKEND=native
          CIBW_TEST_REQUIRES: pytest opencv-python-headless
          CIBW_ENVIRONMENT_MACOS: MACOSX_DEPLOYMENT_TARGET=11.0
        with:
          output-dir: wheelhouse

      - name: Verify native wheel output
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          wheels = sorted(Path("wheelhouse").glob("*.whl"))
          if not wheels:
              raise SystemExit("No wheel was produced.")

          pure_wheels = [wheel.name for wheel in wheels if "py3-none-any" in wheel.name]
          if pure_wheels:
              raise SystemExit(
                  "Fallback pure Python wheel produced instead of a native wheel: "
                  + ", ".join(pure_wheels)
              )

          print("Built native wheel artifacts:")
          for wheel in wheels:
              print(f"  {wheel.name}")
          PY

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.platform.artifact-name }}
          path: wheelhouse/*.whl
          if-no-files-found: error
